<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Auth | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="theme-switch" id="theme-toggle" style="position:fixed; top:20px; right:20px; cursor:pointer;">
        <i class="fas fa-moon"></i>
    </div>

    <main class="auth-card" id="tilt-card">
        <div class="card-header" style="text-align:center;">
            <i class="fas fa-rocket" style="font-size: 2rem; color: var(--primary); margin-bottom:1rem;"></i>
            <h2>Welcome Back</h2>
            <p style="color:var(--text-dim); margin-bottom:2rem;">Premium Auth Experience</p>
        </div>

        <form id="login-form">
            <div class="input-group">
                <input type="email" id="email" required placeholder="Email Address">
            </div>
            <div class="input-group">
                <input type="password" id="password" required placeholder="Password">
            </div>
            <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
            <button type="button" id="google-btn" class="btn-primary" style="background:#fff; color:#000; margin-top:10px;">
                <i class="fab fa-google"></i> Google Sign In
            </button>
            <div style="text-align:center; margin-top:15px;">
                <a href="#" id="forgot-password" style="color:var(--primary); text-decoration:none; font-size:0.9rem;">Forgot Password?</a>
            </div>
        </form>
    </main>

    <form id="login-form">
    <div class="profile-upload-container">
        <label for="profile-pic-input" class="upload-label">
            <img id="preview-img" src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="preview">
            <div class="upload-overlay"><i class="fas fa-camera"></i></div>
        </label>
        <input type="file" id="profile-pic-input" accept="image/*" style="display:none">
    </div>

    <div class="input-group">
        <input type="text" id="reg-name" required placeholder=" ">
        <label><i class="fas fa-user"></i> Full Name</label>
    </div>

    <div class="input-group">
        <input type="text" id="reg-roll" required placeholder=" ">
        <label><i class="fas fa-id-card"></i> Roll Number</label>
    </div>

    <div class="input-group">
        <input type="tel" id="reg-phone" required placeholder=" ">
        <label><i class="fas fa-phone"></i> Phone Number</label>
    </div>

    <div class="input-group">
        <input type="email" id="email" required placeholder=" ">
        <label><i class="fas fa-envelope"></i> Email Address</label>
    </div>

    <div class="input-group">
        <input type="password" id="password" required placeholder=" ">
        <label><i class="fas fa-lock"></i> Password</label>
    </div>

    <button type="submit" class="btn-primary" id="login-btn">
        <span class="btn-text">Create Account</span>
        <div class="spinner" id="loader"></div>
    </button>
</form>

    <div id="toast" class="toast"></div>
    <script type="module" src="script.js"></script>
</body>
</html>
